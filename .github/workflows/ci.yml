name: CI

# Network Vitals is a single, pure-stdlib script (no third-party runtime deps),
# so CI just needs a Python and — for the signed-update tests — openssl, both of
# which the GitHub-hosted runners already provide.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when new commits are pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux across the supported range (README: Python 3.8+), plus the
        # primary target platform (Windows) and macOS on the pinned version.
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show environment
        run: |
          python --version
          openssl version

      - name: Byte-compile the whole tree (syntax check)
        run: python -m compileall -q netquality.py tests

      - name: Run test suite
        run: python -m unittest discover -s tests -v

  lint:
    name: lint (flake8 pyflakes checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: python -m pip install --upgrade flake8
      # Only the pyflakes (F) checks — real errors like unused/undefined names —
      # not pycodestyle style nits. flake8 honours the `# noqa: F401` markers on
      # the intentional platform-availability import probes.
      - name: Run flake8
        run: python -m flake8 --select=F netquality.py tests
